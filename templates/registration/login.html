{% extends "engine/base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">
        <div class="border-4 border-black bg-white p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <h1 class="font-['Epilogue'] font-[900] text-4xl uppercase mb-2 text-center">Sign In</h1>
            <p class="font-metadata text-xs uppercase text-zinc-500 text-center mb-8">Access your Story Studio</p>

            <form method="post" class="space-y-6">
                {% csrf_token %}

                {% if form.errors %}
                <div class="bg-error-container border-2 border-error p-3">
                    <p class="font-metadata text-xs uppercase text-error font-bold">Invalid credentials. Try again.</p>
                </div>
                {% endif %}

                <div>
                    <label class="font-metadata text-xs uppercase font-bold text-zinc-500 mb-2 block">Username</label>
                    <input type="text" name="username" required
                           class="w-full bg-white border-4 border-black p-4 font-metadata uppercase focus:outline-none focus:bg-primary-container transition-colors shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"
                           placeholder="YOUR USERNAME" />
                </div>

                <div>
                    <label class="font-metadata text-xs uppercase font-bold text-zinc-500 mb-2 block">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-white border-4 border-black p-4 font-metadata uppercase focus:outline-none focus:bg-primary-container transition-colors shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"
                           placeholder="••••••••" />
                </div>

                <button type="submit"
                        class="w-full bg-[#FFEE00] text-black border-4 border-black py-4 font-['Epilogue'] font-[800] uppercase text-lg shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all">
                    Enter Studio
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
