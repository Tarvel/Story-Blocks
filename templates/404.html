{% extends "engine/base.html" %}

{% block title %}404 - Lost in the Void{% endblock %}

{% block content %}
<main class="flex flex-col items-center justify-center min-h-[calc(100vh-64px)] px-6 text-center">
    <!-- Big Glitchy 404 -->
    <h1 class="font-['Epilogue'] font-black text-8xl md:text-[12rem] leading-none mb-4 tracking-tighter mix-blend-difference text-error drop-shadow-[8px_8px_0px_rgba(0,0,0,1)]">
        404
    </h1>
    
    <div class="bg-white border-4 border-black p-8 max-w-xl w-full neo-shadow-lg relative overflow-hidden mb-8">
        <!-- Decoration -->
        <div class="absolute -right-4 -top-4 w-12 h-12 bg-primary-container border-4 border-black rotate-12"></div>
        
        <h2 class="font-['Epilogue'] font-black text-2xl md:text-3xl uppercase mb-4">Dead End</h2>
        <p class="font-metadata text-lg md:text-xl text-on-surface-variant mb-8 leading-relaxed">
            The narrative branch you're looking for has been severed, deleted, or never existed in the first place.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="window.history.back()" class="bg-surface-variant text-black border-4 border-black px-6 py-3 font-['Epilogue'] font-black uppercase tracking-wider neo-shadow-sm hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all flex-1 md:flex-none">
                Go Back
            </button>
            <a href="{% url 'engine:dashboard' %}" class="bg-[#FFEE00] text-black border-4 border-black px-6 py-3 font-['Epilogue'] font-black uppercase tracking-wider neo-shadow-sm hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all no-underline block flex-1 md:flex-none">
                Return to Dashboard
            </a>
        </div>
    </div>

    <!-- Decorative Nodes -->
    <div class="flex gap-4 opacity-50 pointer-events-none">
        <div class="w-8 h-8 rounded-full border-4 border-black bg-error"></div>
        <div class="w-8 h-8 rounded-full border-4 border-black bg-white"></div>
        <div class="w-8 h-8 rounded-full border-4 border-black bg-white"></div>
    </div>
</main>
{% endblock %}
